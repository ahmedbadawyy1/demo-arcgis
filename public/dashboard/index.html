<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>لوحة الطقس — Windy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0c0f14;
        --panel: #151b24;
        --panel2: #1c2430;
        --accent: #c9a962;
        --accent-dim: rgba(201, 169, 98, 0.22);
        --border: rgba(255, 255, 255, 0.07);
        --text: #eef2f7;
        --muted: #8e99ab;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        font-family: "Noto Sans Arabic", "Segoe UI", Tahoma, sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      .shell {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
        box-shadow: 0 0 0 1px var(--border);
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.75rem 1.25rem;
        background: linear-gradient(180deg, var(--panel2) 0%, var(--panel) 100%);
        border-bottom: 1px solid var(--border);
      }
      header h1 {
        margin: 0;
        font-size: 1.2rem;
        font-weight: 700;
        letter-spacing: 0.03em;
      }
      header .sub {
        margin-top: 0.2rem;
        font-size: 0.78rem;
        color: var(--muted);
        font-weight: 400;
      }
      .badge {
        font-size: 0.65rem;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--accent);
        border: 1px solid var(--accent-dim);
        padding: 0.35rem 0.65rem;
        border-radius: 999px;
        background: rgba(201, 169, 98, 0.08);
      }

      .chrome {
        background: var(--panel);
        border-bottom: 1px solid var(--border);
      }
      .chrome-inner {
        padding: 0.65rem 1rem 0.85rem;
      }
      .row-label {
        font-size: 0.68rem;
        font-weight: 600;
        color: var(--muted);
        margin-bottom: 0.45rem;
        letter-spacing: 0.04em;
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
        align-items: center;
      }
      .toolbar + .toolbar {
        margin-top: 0.55rem;
      }

      button.tab {
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.03);
        color: var(--text);
        padding: 0.42rem 0.85rem;
        border-radius: 8px;
        cursor: pointer;
        font-size: 0.82rem;
        font-family: inherit;
        font-weight: 500;
        transition:
          background 0.15s,
          border-color 0.15s,
          color 0.15s;
      }
      button.tab:hover {
        border-color: rgba(201, 169, 98, 0.45);
        background: rgba(255, 255, 255, 0.06);
      }
      button.tab.active {
        background: var(--accent-dim);
        border-color: rgba(201, 169, 98, 0.65);
        color: #fff;
      }

      .grow {
        flex: 1;
        min-width: 0.25rem;
      }

      .layout {
        flex: 1;
        display: flex;
        min-height: 0;
      }

      .map-area {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
        position: relative;
        background: #050608;
      }

      #windy-iframe {
        flex: 1;
        width: 100%;
        min-height: calc(100vh - 200px);
        min-height: max(62vh, 420px);
        border: 0;
      }

      .loading {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(12, 15, 20, 0.72);
        color: var(--text);
        font-size: 0.95rem;
        font-weight: 500;
        z-index: 2;
      }
      .loading[hidden] {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header>
        <div>
          <h1>لوحة الطقس</h1>
          <div class="sub">مركز الخريطة: الإمارات · طبقات Windy التفاعلية</div>
        </div>
        <span class="badge" title="UAE viewport">UAE zoom</span>
      </header>

      <div class="chrome">
        <div class="chrome-inner">
          <div class="row-label">الطبقات الأساسية</div>
          <div class="toolbar">
            <button type="button" class="tab active" data-overlay="wind" aria-pressed="true">الرياح</button>
            <button type="button" class="tab" data-overlay="gust" aria-pressed="false">هبات الرياح</button>
            <button type="button" class="tab" data-overlay="temp" aria-pressed="false">درجة الحرارة</button>
            <button type="button" class="tab" data-overlay="rh" aria-pressed="false">الرطوبة</button>
            <button type="button" class="tab" data-overlay="clouds" aria-pressed="false">السحب</button>
            <button type="button" class="tab" data-overlay="rain" aria-pressed="false">المطر</button>
          </div>
          <div class="row-label" style="margin-top: 0.65rem">طبقات إضافية</div>
          <div class="toolbar">
            <button type="button" class="tab" data-overlay="thunder" aria-pressed="false">العواصف الرعدية</button>
            <button type="button" class="tab" data-overlay="pressure" aria-pressed="false">الضغط الجوي</button>
            <button type="button" class="tab" data-overlay="waves" aria-pressed="false">الأمواج</button>
            <span class="grow"></span>
            <button type="button" class="tab" id="btn-fullscreen" title="ملء الشاشة">توسيع الخريطة</button>
          </div>
        </div>
      </div>

      <div class="layout">
        <div class="map-area" id="map-stage">
          <div class="loading" id="loading">جاري تحميل الخريطة…</div>
          <iframe
            id="windy-iframe"
            title="Windy map"
            loading="lazy"
            allow="fullscreen"
            referrerpolicy="no-referrer-when-downgrade"
          ></iframe>
        </div>
      </div>
    </div>

    <script>
      (function () {
        const UAE_LAT = 24.35;
        const UAE_LON = 54.42;
        const UAE_ZOOM = 8;

        const iframe = document.getElementById("windy-iframe");
        const loading = document.getElementById("loading");
        const tabs = document.querySelectorAll("button.tab[data-overlay]");
        const mapStage = document.getElementById("map-stage");

        function parseNum(q, key, def) {
          const v = q.get(key);
          if (v === null || v === "") return def;
          const n = Number(v);
          return Number.isFinite(n) ? n : def;
        }

        function buildWindyEmbedUrlClient(overlay) {
          const q = new URLSearchParams(window.location.search);
          const lat = parseNum(q, "lat", UAE_LAT);
          const lon = parseNum(q, "lon", UAE_LON);
          const zoom = parseNum(q, "zoom", UAE_ZOOM);
          const level = q.get("level") || "surface";
          const metricWind = q.get("metricWind") || "kmh";
          const metricTemp = q.get("metricTemp") || "default";
          const radarRange = q.get("radarRange") || "-1";
          const detailLat = parseNum(q, "detailLat", lat);
          const detailLon = parseNum(q, "detailLon", lon);
          const params = new URLSearchParams({
            lat: String(lat),
            lon: String(lon),
            zoom: String(zoom),
            level,
            overlay,
            menu: "",
            message: "",
            marker: "",
            calendar: "",
            pressure: "",
            type: "map",
            location: "coordinates",
            detail: "",
            detailLat: String(detailLat),
            detailLon: String(detailLon),
            metricWind,
            metricTemp,
            radarRange,
          });
          return "https://embed.windy.com/embed2.html?" + params.toString();
        }

        async function loadWindy(overlay) {
          loading.hidden = false;
          loading.textContent = "جاري تحميل الخريطة…";
          try {
            const q = new URLSearchParams({ overlay });
            const res = await fetch("/api/windy/embed?" + q.toString());
            if (!res.ok) throw new Error("embed failed");
            const data = await res.json();
            iframe.src = data.embedUrl;
          } catch (e) {
            iframe.src = buildWindyEmbedUrlClient(overlay);
            console.warn("windy api fallback", e);
          }
        }

        iframe.addEventListener("load", function () {
          loading.hidden = true;
        });

        tabs.forEach(function (btn) {
          btn.addEventListener("click", function () {
            const overlay = btn.getAttribute("data-overlay");
            tabs.forEach(function (b) {
              b.classList.toggle("active", b === btn);
              b.setAttribute("aria-pressed", b === btn ? "true" : "false");
            });
            loadWindy(overlay);
          });
        });

        document.getElementById("btn-fullscreen").addEventListener("click", function () {
          if (!document.fullscreenElement) {
            mapStage.requestFullscreen().catch(function () {});
          } else {
            document.exitFullscreen();
          }
        });

        const active = document.querySelector("button.tab.active[data-overlay]");
        loadWindy(active ? active.getAttribute("data-overlay") : "wind");
      })();
    </script>
  </body>
</html>
