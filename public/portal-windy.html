<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>لوحة الطقس — Windy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0c0f14;
        --panel: #151b24;
        --panel2: #1c2430;
        --accent: #c9a962;
        --accent-dim: rgba(201, 169, 98, 0.22);
        --border: rgba(255, 255, 255, 0.07);
        --text: #eef2f7;
        --muted: #8e99ab;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        font-family: "Noto Sans Arabic", "Segoe UI", Tahoma, sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      .shell {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
        box-shadow: 0 0 0 1px var(--border);
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.75rem 1.25rem;
        background: linear-gradient(180deg, var(--panel2) 0%, var(--panel) 100%);
        border-bottom: 1px solid var(--border);
      }
      header h1 {
        margin: 0;
        font-size: 1.2rem;
        font-weight: 700;
        letter-spacing: 0.03em;
      }
      header .sub {
        margin-top: 0.2rem;
        font-size: 0.78rem;
        color: var(--muted);
        font-weight: 400;
      }
      .badge {
        font-size: 0.65rem;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--accent);
        border: 1px solid var(--accent-dim);
        padding: 0.35rem 0.65rem;
        border-radius: 999px;
        background: rgba(201, 169, 98, 0.08);
      }

      .risk-rail {
        padding: 0.55rem 1rem 0.65rem;
        background: #121821;
        border-bottom: 1px solid var(--border);
      }
      .risk-rail__summary {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.45rem;
        margin-bottom: 0.45rem;
      }
      .risk-rail__title {
        font-size: 0.72rem;
        font-weight: 700;
        color: var(--muted);
      }
      .risk-pill {
        font-size: 0.78rem;
        font-weight: 600;
        padding: 0.28rem 0.7rem;
        border-radius: 999px;
      }
      .risk-pill--low {
        background: rgba(46, 160, 120, 0.22);
        color: #9ee8c9;
      }
      .risk-pill--medium {
        background: rgba(220, 170, 60, 0.22);
        color: #ffd87a;
      }
      .risk-pill--high {
        background: rgba(220, 80, 70, 0.28);
        color: #ffb4ae;
      }
      .risk-meta {
        font-size: 0.68rem;
        color: var(--muted);
      }
      .risk-rail__alarms {
        display: flex;
        flex-wrap: wrap;
        gap: 0.35rem;
      }
      .alarm-chip {
        font-size: 0.72rem;
        padding: 0.28rem 0.55rem;
        border-radius: 6px;
        border: 1px solid var(--border);
        line-height: 1.35;
      }
      .alarm-chip--critical {
        border-color: rgba(220, 90, 80, 0.55);
        background: rgba(180, 60, 55, 0.14);
      }
      .alarm-chip--warning {
        border-color: rgba(220, 170, 60, 0.45);
        background: rgba(220, 170, 60, 0.08);
      }
      .alarm-chip--info {
        border-color: rgba(100, 160, 220, 0.35);
        background: rgba(80, 140, 200, 0.1);
      }
      .risk-rail__hint {
        margin: 0.35rem 0 0;
        font-size: 0.68rem;
        color: var(--muted);
        line-height: 1.45;
      }

      .chrome {
        background: var(--panel);
        border-bottom: 1px solid var(--border);
      }
      .chrome-inner {
        padding: 0.65rem 1rem 0.85rem;
      }
      .row-label {
        font-size: 0.68rem;
        font-weight: 600;
        color: var(--muted);
        margin-bottom: 0.45rem;
        letter-spacing: 0.04em;
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
        align-items: center;
      }
      .toolbar + .toolbar {
        margin-top: 0.55rem;
      }

      button.tab {
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.03);
        color: var(--text);
        padding: 0.42rem 0.85rem;
        border-radius: 8px;
        cursor: pointer;
        font-size: 0.82rem;
        font-family: inherit;
        font-weight: 500;
        transition:
          background 0.15s,
          border-color 0.15s,
          color 0.15s;
      }
      button.tab:hover {
        border-color: rgba(201, 169, 98, 0.45);
        background: rgba(255, 255, 255, 0.06);
      }
      button.tab.active {
        background: var(--accent-dim);
        border-color: rgba(201, 169, 98, 0.65);
        color: #fff;
      }

      .grow {
        flex: 1;
        min-width: 0.25rem;
      }

      .layout {
        flex: 1;
        display: flex;
        min-height: 0;
      }

      .map-area {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
        position: relative;
        background: #050608;
      }

      #windy-iframe {
        flex: 1;
        width: 100%;
        min-height: calc(100vh - 200px);
        min-height: max(62vh, 420px);
        border: 0;
      }

      .loading {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(12, 15, 20, 0.72);
        color: var(--text);
        font-size: 0.95rem;
        font-weight: 500;
        z-index: 2;
      }
      .loading[hidden] {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header>
        <div>
          <h1>لوحة الطقس</h1>
          <div class="sub">مركز الخريطة: الإمارات · طبقات Windy التفاعلية</div>
        </div>
        <span class="badge" title="UAE viewport">UAE zoom</span>
      </header>

      <section id="risk-rail" class="risk-rail" aria-live="polite">
        <div class="risk-rail__summary">
          <span class="risk-rail__title">المخاطر والتنبيهات</span>
          <span id="risk-overall" class="risk-pill risk-pill--low">جاري التحميل…</span>
          <span id="risk-meta" class="risk-meta"></span>
        </div>
        <div id="risk-alarms" class="risk-rail__alarms"></div>
        <p id="risk-hint" class="risk-rail__hint" hidden></p>
      </section>

      <div class="chrome">
        <div class="chrome-inner">
          <div class="row-label">الطبقات الأساسية</div>
          <div class="toolbar">
            <button type="button" class="tab active" data-overlay="wind" aria-pressed="true">الرياح</button>
            <button type="button" class="tab" data-overlay="gust" aria-pressed="false">هبات الرياح</button>
            <button type="button" class="tab" data-overlay="temp" aria-pressed="false">درجة الحرارة</button>
            <button type="button" class="tab" data-overlay="rh" aria-pressed="false">الرطوبة</button>
            <button type="button" class="tab" data-overlay="clouds" aria-pressed="false">السحب</button>
            <button type="button" class="tab" data-overlay="rain" aria-pressed="false">المطر</button>
          </div>
          <div class="row-label" style="margin-top: 0.65rem">طبقات إضافية</div>
          <div class="toolbar">
            <button type="button" class="tab" data-overlay="thunder" aria-pressed="false">العواصف الرعدية</button>
            <button type="button" class="tab" data-overlay="pressure" aria-pressed="false">الضغط الجوي</button>
            <button type="button" class="tab" data-overlay="waves" aria-pressed="false">الأمواج</button>
            <span class="grow"></span>
            <button type="button" class="tab" id="btn-fullscreen" title="ملء الشاشة">توسيع الخريطة</button>
          </div>
        </div>
      </div>

      <div class="layout">
        <div class="map-area" id="map-stage">
          <div class="loading" id="loading">جاري تحميل الخريطة…</div>
          <iframe
            id="windy-iframe"
            title="Windy map"
            loading="lazy"
            allow="fullscreen"
            referrerpolicy="no-referrer-when-downgrade"
          ></iframe>
        </div>
      </div>
    </div>

    <script>
      (function () {
        var UAE_LAT = 24.35;
        var UAE_LON = 54.42;
        var UAE_ZOOM = 8;

        var iframe = document.getElementById("windy-iframe");
        var loading = document.getElementById("loading");
        var tabs = document.querySelectorAll("button.tab[data-overlay]");
        var mapStage = document.getElementById("map-stage");

        function parseNum(q, key, def) {
          var v = q.get(key);
          if (v === null || v === "") return def;
          var n = Number(v);
          return Number.isFinite(n) ? n : def;
        }

        function buildWindyEmbedUrl(overlay) {
          var q = new URLSearchParams(window.location.search);
          var lat = parseNum(q, "lat", UAE_LAT);
          var lon = parseNum(q, "lon", UAE_LON);
          var zoom = parseNum(q, "zoom", UAE_ZOOM);
          var level = q.get("level") || "surface";
          var metricWind = q.get("metricWind") || "kmh";
          var metricTemp = q.get("metricTemp") || "default";
          var radarRange = q.get("radarRange") || "-1";
          var detailLat = parseNum(q, "detailLat", lat);
          var detailLon = parseNum(q, "detailLon", lon);
          var params = new URLSearchParams({
            lat: String(lat),
            lon: String(lon),
            zoom: String(zoom),
            level: level,
            overlay: overlay,
            menu: "",
            message: "",
            marker: "",
            calendar: "",
            pressure: "",
            type: "map",
            location: "coordinates",
            detail: "",
            detailLat: String(detailLat),
            detailLon: String(detailLon),
            metricWind: metricWind,
            metricTemp: metricTemp,
            radarRange: radarRange,
          });
          return "https://embed.windy.com/embed2.html?" + params.toString();
        }

        function loadWindy(overlay) {
          loading.hidden = false;
          iframe.src = buildWindyEmbedUrl(overlay);
        }

        iframe.addEventListener("load", function () {
          loading.hidden = true;
        });

        tabs.forEach(function (btn) {
          btn.addEventListener("click", function () {
            var overlay = btn.getAttribute("data-overlay");
            tabs.forEach(function (b) {
              b.classList.toggle("active", b === btn);
              b.setAttribute("aria-pressed", b === btn ? "true" : "false");
            });
            loadWindy(overlay);
          });
        });

        document.getElementById("btn-fullscreen").addEventListener("click", function () {
          if (!document.fullscreenElement) {
            mapStage.requestFullscreen().catch(function () {});
          } else {
            document.exitFullscreen();
          }
        });

        var active = document.querySelector("button.tab.active[data-overlay]");
        loadWindy(active ? active.getAttribute("data-overlay") : "wind");
      })();
    </script>
    <script>
      (function () {
        function riskBriefUrl() {
          var apiBase = new URLSearchParams(window.location.search).get("apiBase");
          if (apiBase) return apiBase.replace(/\/$/, "") + "/api/risk-brief";
          return "/api/risk-brief";
        }
        function bandLabel(band) {
          if (band === "high") return "مرتفع";
          if (band === "medium") return "متوسط";
          return "منخفض";
        }
        function pillClass(band) {
          if (band === "high") return "risk-pill--high";
          if (band === "medium") return "risk-pill--medium";
          return "risk-pill--low";
        }
        function chipClass(level) {
          if (level === "critical") return "alarm-chip alarm-chip--critical";
          if (level === "warning") return "alarm-chip alarm-chip--warning";
          return "alarm-chip alarm-chip--info";
        }
        var overallEl = document.getElementById("risk-overall");
        var metaEl = document.getElementById("risk-meta");
        var alarmsEl = document.getElementById("risk-alarms");
        var hintEl = document.getElementById("risk-hint");

        function renderRisk(data) {
          if (!data.ok) return;
          overallEl.className = "risk-pill " + pillClass(data.overall.maxBand);
          overallEl.textContent =
            "أعلى خطر: " +
            bandLabel(data.overall.maxBand) +
            " (" +
            Math.round(data.overall.maxScore) +
            ")" +
            (data.overall.worstLocation ? " — " + data.overall.worstLocation : "");
          var hz = data.hazards || {};
          metaEl.textContent =
            "زلازل: " +
            (hz.earthquakeCount || 0) +
            " · حرائق: " +
            (hz.wildfireCount || 0) +
            " · تحديث: " +
            new Date(data.generatedAt).toLocaleString("ar-AE");
          alarmsEl.innerHTML = "";
          (data.alarms || []).forEach(function (a) {
            var span = document.createElement("span");
            span.className = chipClass(a.level);
            span.textContent = a.text;
            alarmsEl.appendChild(span);
          });
          hintEl.hidden = true;
        }

        async function refreshRisk() {
          try {
            var res = await fetch(riskBriefUrl(), { credentials: "omit" });
            var data = await res.json();
            if (!res.ok) throw new Error(data.message || "risk unavailable");
            if (!data.ok) {
              overallEl.className = "risk-pill risk-pill--low";
              overallEl.textContent = "في انتظار أول تحديث";
              metaEl.textContent = "";
              alarmsEl.innerHTML = "";
              hintEl.hidden = false;
              hintEl.textContent = data.message || "";
              return;
            }
            renderRisk(data);
          } catch (e) {
            overallEl.className = "risk-pill risk-pill--low";
            overallEl.textContent = "التنبيهات غير متصلة";
            metaEl.textContent = "";
            alarmsEl.innerHTML = "";
            hintEl.hidden = false;
            hintEl.textContent = new URLSearchParams(window.location.search).get("apiBase")
              ? "تعذر جلب التنبيهات من الخادم."
              : "لعرض المخاطر والتنبيهات أضف: ?apiBase=https://عنوان-خادمك (بدون / في النهاية)، أو افتح هذه الصفحة من نفس خادم التطبيق.";
          }
        }

        refreshRisk();
        setInterval(refreshRisk, 120000);
      })();
    </script>
  </body>
</html>
